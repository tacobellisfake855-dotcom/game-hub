<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NovaGames Ultimate Hub</title>

<style>
body {
margin:0;
font-family:system-ui;
background:#060913;
color:white;
}

#login {
display:flex;
height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
gap:10px;
}

input {
padding:10px;
border:none;
border-radius:8px;
}

button {
padding:10px 14px;
border-radius:8px;
border:none;
background:#2d6cdf;
color:white;
cursor:pointer;
margin:5px;
}

#hub {
display:none;
padding:15px;
}

#top {
display:flex;
justify-content:space-between;
align-items:center;
}

.card {
background:#1a2444;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
width:180px;
cursor:pointer;
}

canvas {
display:none;
background:black;
margin:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🎮 NovaGames Ultimate Hub</h2>
<input id="name" placeholder="Username">
<button onclick="enter()">Enter</button>
</div>

<!-- HUB -->
<div id="hub">

<div id="top">
<h3 id="profile"></h3>
<button onclick="home()">🏠 Home</button>
</div>

<div id="menu"></div>

<canvas id="game" width="500" height="500"></canvas>

</div>

<script>

let user;
let score=0;
let loop;

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

/* ================= DATABASE ================= */
function loadDB(){
return JSON.parse(localStorage.getItem("nova_all")||"{}");
}

function saveDB(db){
localStorage.setItem("nova_all",JSON.stringify(db));
}

/* ================= ENTER ================= */
function enter(){
let name=document.getElementById("name").value;
if(!name) return;

let db=loadDB();

if(!db[name]){
db[name]={
coins:0,
xp:0,
best:0
};
}

user={name,stats:db[name]};

document.getElementById("login").style.display="none";
document.getElementById("hub").style.display="block";

render();
}

/* ================= UI ================= */
function render(){
document.getElementById("profile").innerText=
`👤 ${user.name} 💰${user.stats.coins} ⭐${user.stats.xp}`;

let menu=document.getElementById("menu");
menu.innerHTML="";

const games=[
{name:"🐍 Snake",id:"snake",cost:0},
{name:"🚗 Dodge",id:"dodge",cost:5},
{name:"🚀 Space",id:"space",cost:10},
{name:"🧱 Grid Run",id:"grid",cost:15}
];

games.forEach(g=>{
menu.innerHTML+=`
<div class="card" onclick="start('${g.id}',${g.cost})">
<b>${g.name}</b><br>
Cost: ${g.cost}
</div>`;
});
}

/* ================= START ================= */
function start(id,cost){
if(user.stats.coins<cost) return alert("Locked!");

canvas.style.display="block";
score=0;

if(id==="snake") snake();
if(id==="dodge") dodge();
if(id==="space") space();
if(id==="grid") grid();
}

/* ================= SNAKE ================= */
function snake(){
let s=[{x:250,y:250}];
let d={x:10,y:0};
let f=rand();

document.onkeydown=e=>{
if(e.key==="ArrowUp")d={x:0,y:-10};
if(e.key==="ArrowDown")d={x:0,y:10};
if(e.key==="ArrowLeft")d={x:-10,y:0};
if(e.key==="ArrowRight")d={x:10,y:0};
};

loop=setInterval(()=>{
ctx.fillStyle="black";
ctx.fillRect(0,0,500,500);

s.unshift({x:s[0].x+d.x,y:s[0].y+d.y});

if(s[0].x===f.x&&s[0].y===f.y){
f=rand();
score++;
user.stats.coins++;
user.stats.xp++;
}else s.pop();

ctx.fillStyle="red";
ctx.fillRect(f.x,f.y,10,10);

ctx.fillStyle="lime";
s.forEach(p=>ctx.fillRect(p.x,p.y,10,10));

if(hit(s[0])) end();

},70);
}

/* ================= DODGE ================= */
function dodge(){
let p={x:250,y:450};
let obs=[];

document.onkeydown=e=>{
if(e.key==="ArrowLeft")p.x-=15;
if(e.key==="ArrowRight")p.x+=15;
};

loop=requestAnimationFrame(run);

function run(){
ctx.fillStyle="black";
ctx.fillRect(0,0,500,500);

if(Math.random()<0.05)
obs.push({x:Math.random()*480,y:0});

obs.forEach(o=>o.y+=5);

ctx.fillStyle="red";
obs.forEach(o=>ctx.fillRect(o.x,o.y,20,20));

ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,20,20);

score++;

if(obs.some(o=>o.y>450&&Math.abs(o.x-p.x)<20)){
end(); return;
}

requestAnimationFrame(run);
}
}

/* ================= SPACE ================= */
function space(){
let p={x:250,y:450};
let rocks=[];

document.onkeydown=e=>{
if(e.key==="ArrowLeft")p.x-=10;
if(e.key==="ArrowRight")p.x+=10;
};

loop=setInterval(()=>{
ctx.fillStyle="black";
ctx.fillRect(0,0,500,500);

if(Math.random()<0.05)
rocks.push({x:Math.random()*480,y:0});

rocks.forEach(r=>r.y+=4);

ctx.fillStyle="gray";
rocks.forEach(r=>ctx.fillRect(r.x,r.y,20,20));

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,20,20);

score++;

if(rocks.some(r=>r.y>450&&Math.abs(r.x-p.x)<20)){
end();
}

},30);
}

/* ================= GRID ================= */
function grid(){
let p={x:250,y:250};

loop=setInterval(()=>{
ctx.fillStyle="black";
ctx.fillRect(0,0,500,500);

p.x+=(Math.random()-0.5)*20;
p.y+=(Math.random()-0.5)*20;

ctx.fillStyle="cyan";
ctx.fillRect(p.x,p.y,20,20);

score++;

if(p.x<0||p.y<0||p.x>500||p.y>500){
end();
}

},30);
}

/* ================= END ================= */
function end(){
clearInterval(loop);

let db=loadDB();

user.stats.coins+=Math.floor(score/2);
user.stats.xp+=score;
user.stats.best=Math.max(user.stats.best,score);

db[user.name]=user.stats;
saveDB(db);

alert("Game Over! Score: "+score);

canvas.style.display="none";
render();
}

/* ================= UTILS ================= */
function rand(){
return{
x:Math.floor(Math.random()*50)*10,
y:Math.floor(Math.random()*50)*10
};
}

function hit(p){
return p.x<0||p.y<0||p.x>490||p.y>490;
}

</script>

</body>
</html>
